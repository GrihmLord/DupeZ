[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    hardware: end-to-end tests that require Administrator, Npcap, WinDivert,
        and a live target on the local network. Skipped by default — opt in
        with `pytest -m hardware` on the Windows host.
    slow: tests that take more than a couple seconds to execute.
addopts = -ra --strict-markers
