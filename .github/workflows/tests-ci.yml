name: tests-ci

on:
  pull_request:
    paths:
      - 'app/**'
      - 'packaging/**'
      - 'scripts/verify_bundled_binaries.py'
      - 'tests/**'
      - '.github/workflows/tests-ci.yml'
      - 'requirements.in'
      - 'requirements-locked.txt'
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'packaging/**'
      - 'scripts/verify_bundled_binaries.py'
      - 'tests/**'
      - '.github/workflows/tests-ci.yml'
      - 'requirements.in'
      - 'requirements-locked.txt'

permissions:
  contents: read

jobs:
  pytest:
    runs-on: windows-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements-locked.txt
          pip install pytest pytest-cov

      - name: Run pytest
        id: pytest
        shell: bash
        env:
          DUPEZ_OFFSEC_CONSENT: ""
          DUPEZ_SECOND_FACTOR_DISABLED: "1"
        run: |
          set +e
          python -m pytest tests/ -q --maxfail=5 \
            --junitxml=pytest-${{ matrix.python-version }}.xml \
            --cov=app.core.second_factor \
            --cov=app.gui.dayz_account_tracker \
            --cov-report=term 2>&1 | tee pytest-${{ matrix.python-version }}.log
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Show pytest failure tail
        if: steps.pytest.outputs.exit_code != '0'
        shell: bash
        run: |
          echo "::group::Last 300 lines of pytest output"
          tail -n 300 pytest-${{ matrix.python-version }}.log || true
          echo "::endgroup::"

      - name: Upload pytest diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pytest-diagnostics-${{ matrix.python-version }}-${{ github.run_id }}
          path: |
            pytest-${{ matrix.python-version }}.xml
            pytest-${{ matrix.python-version }}.log
          if-no-files-found: error
          retention-days: 7

      - name: Fail pytest job
        if: steps.pytest.outputs.exit_code != '0'
        shell: bash
        run: |
          echo "pytest failed with exit code ${{ steps.pytest.outputs.exit_code }}"
          exit 1

  ast-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: AST-parse every app/*.py
        shell: bash
        run: |
          python -c "
          import ast, pathlib, sys
          fails = []
          for p in pathlib.Path('app').rglob('*.py'):
              try:
                  ast.parse(p.read_text(encoding='utf-8'))
              except SyntaxError as e:
                  fails.append((str(p), str(e)))
          if fails:
              for f, err in fails:
                  print(f'SYNTAX FAIL {f}: {err}')
              sys.exit(1)
          print('AST OK: scanned all files')
          "
