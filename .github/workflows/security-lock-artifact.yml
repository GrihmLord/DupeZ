name: Security Lock Artifact

on:
  pull_request:
    branches: [main]
    paths:
      - "requirements.in"
      - "requirements-locked.txt"
      - ".github/workflows/security-lock-artifact.yml"

permissions:
  contents: write

concurrency:
  group: security-lock-artifact-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  generate:
    if: github.head_ref == 'security/v5.7.9-dependency-fixes'
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}

      - name: Set up canonical release Python 3.11.9
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.11.9'
          architecture: x64

      - name: Regenerate lock without broad upgrades
        shell: pwsh
        run: |
          python -m pip install --disable-pip-version-check --upgrade "pip<27" "pip-tools==7.6.0"
          Copy-Item requirements-locked.txt requirements-locked.before.txt
          python -m piptools compile `
            --generate-hashes `
            --resolver=backtracking `
            --output-file=requirements-locked.txt `
            requirements.in
          python scripts/verify_requirements_lock.py `
            --requirements requirements.in `
            --lock requirements-locked.txt
          python -m pip install --disable-pip-version-check --dry-run --require-hashes -r requirements-locked.txt

      - name: Verify approved dependency scope
        shell: pwsh
        run: |
          @'
          import re
          from pathlib import Path

          allowed = {"cryptography", "pillow", "urllib3", "idna", "zeroconf"}
          expected = {
              "cryptography": "48.0.1",
              "pillow": "12.3.0",
              "urllib3": "2.7.0",
              "idna": "3.15",
              "zeroconf": "0.149.16",
          }
          pin_re = re.compile(r"(?m)^([A-Za-z0-9_.-]+)==([^\s\\;]+)")
          hash_re = re.compile(r"--hash=sha256:([0-9a-f]{64})")

          def norm(name):
              return re.sub(r"[-_.]+", "-", name).lower()

          def versions(path):
              text = Path(path).read_text(encoding="utf-8")
              return {norm(name): version for name, version in pin_re.findall(text)}

          before = versions("requirements-locked.before.txt")
          after = versions("requirements-locked.txt")
          changed = {
              name for name in set(before) | set(after)
              if before.get(name) != after.get(name)
          }
          unexpected = sorted(changed - allowed)
          if unexpected:
              raise SystemExit(f"unexpected version changes: {unexpected}")

          for name, version in expected.items():
              if after.get(name) != version:
                  raise SystemExit(
                      f"{name}: expected {version}, found {after.get(name)!r}"
                  )

          text = Path("requirements-locked.txt").read_text(encoding="utf-8")
          for block in re.split(r"(?m)(?=^[A-Za-z0-9_.-]+==)", text):
              lines = block.splitlines()
              if not lines or "==" not in lines[0]:
                  continue
              hashes = hash_re.findall(block)
              if len(hashes) != len(set(hashes)):
                  raise SystemExit(f"duplicate hashes in {lines[0]}")

          print("approved changes:", sorted(changed))
          print("unrelated dependency versions unchanged")
          print("hash uniqueness pass")
          '@ | Set-Content validate_security_lock.py -Encoding UTF8
          python validate_security_lock.py

      - name: Commit verified lock to the PR branch
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add requirements-locked.txt
          git diff --cached --check
          if (git diff --cached --quiet) {
            Write-Host "Verified lock is already committed."
          }
          else {
            git commit -m "security: regenerate runtime lock for patched dependencies"
            git push origin "HEAD:${{ github.head_ref }}"
          }

      - name: Upload regenerated lock
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dupez-v5.7.9-security-lock-${{ github.run_id }}
          path: requirements-locked.txt
          if-no-files-found: error
          retention-days: 7
