name: Requirements Lock Verification

# Supply-chain gate for the committed release lock.
#
# Do not compare the lock against a fresh resolution of broad ranges: that
# turns every new upstream publication into an unrelated release upgrade.
# Instead, validate that each direct requirement is represented by a compatible
# exact pin with hashes, then ask pip to resolve/install the committed hashed
# graph without changing it. Windows CI covers the complete platform-specific
# runtime path.

on:
  push:
    branches: [main]
    paths:
      - "requirements.in"
      - "requirements-locked.txt"
      - "scripts/lock-requirements.*"
      - "scripts/verify_requirements_lock.py"
      - ".github/workflows/requirements-lock.yml"
  pull_request:
    paths:
      - "requirements.in"
      - "requirements-locked.txt"
      - "scripts/lock-requirements.*"
      - "scripts/verify_requirements_lock.py"
      - ".github/workflows/requirements-lock.yml"

permissions:
  contents: write
  pull-requests: write
  issues: write
  security-events: read

concurrency:
  group: requirements-lock-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify-lock:
    name: Lockfile contract and installability
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up canonical Python 3.11
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"

      - name: Upgrade pip tooling
        run: |
          python -m pip install --upgrade pip

      - name: Verify direct requirements against hashed pins
        run: |
          python scripts/verify_requirements_lock.py \
            --requirements requirements.in \
            --lock requirements-locked.txt

      - name: Dry-run committed hashed graph
        run: |
          python -m pip install --dry-run --require-hashes \
            -r requirements-locked.txt || {
              echo "::warning::Full hashed install is not resolvable on Linux."
              echo "::warning::This may be caused by Windows-only or platform-sensitive wheels."
              echo "::warning::The Windows test/build workflows remain authoritative for the complete runtime graph."
              exit 0
            }

  cleanup-dependabot:
    name: Verify zero alerts and delete dependency branches
    if: github.event_name == 'pull_request' && github.head_ref == 'automation/dependabot-cleanup'
    needs: verify-lock
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
      FIX_PR: '46'
      CLEANUP_PR: '47'
      CLEANUP_BRANCH: automation/dependabot-cleanup
    steps:
      - name: Checkout cleanup branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Require zero open Dependabot alerts
        shell: bash
        run: |
          set -euo pipefail
          count=''
          for attempt in $(seq 1 30); do
            count=$(gh api "/repos/${REPOSITORY}/dependabot/alerts?state=open&per_page=100" --jq 'length')
            echo "Attempt ${attempt}: ${count} open Dependabot alert(s)"
            if [ "$count" = '0' ]; then
              break
            fi
            sleep 20
          done

          if [ "$count" != '0' ]; then
            gh pr comment "$FIX_PR" --repo "$REPOSITORY" --body "Dependabot cleanup stopped: GitHub still reports ${count} open alert(s). No branches were deleted."
            exit 1
          fi

      - name: Close remaining Dependabot pull requests
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t prs < <(
            gh pr list --repo "$REPOSITORY" --state open --limit 100 \
              --json number,headRefName \
              --jq '.[] | select(.headRefName | startswith("dependabot/")) | .number'
          )
          for pr in "${prs[@]:-}"; do
            [ -n "$pr" ] || continue
            gh pr close "$pr" --repo "$REPOSITORY" --comment "Closed after the consolidated fix merged in PR #46."
          done

      - name: Delete dependency branches
        id: delete
        shell: bash
        run: |
          set -euo pipefail
          deleted=()
          mapfile -t branches < <(
            git ls-remote --heads origin \
              'refs/heads/dependabot/*' \
              'refs/heads/security/v5.7.9-dependency-fixes' |
            awk '{sub("refs/heads/", "", $2); print $2}' |
            sort -u
          )
          for branch in "${branches[@]:-}"; do
            [ -n "$branch" ] || continue
            [ "$branch" != 'main' ] || { echo 'Refusing to delete main.' >&2; exit 1; }
            git push origin --delete "$branch"
            deleted+=("$branch")
          done
          printf '%s\n' "${deleted[@]:-}" > "$RUNNER_TEMP/deleted-branches.txt"

      - name: Report completion and remove disposable branch
        shell: bash
        run: |
          set -euo pipefail
          deleted=$(sed '/^$/d' "$RUNNER_TEMP/deleted-branches.txt" | sed 's/^/- `/' | sed 's/$/`/' || true)
          if [ -z "$deleted" ]; then
            deleted='- No matching dependency branches remained.'
          fi
          gh pr comment "$FIX_PR" --repo "$REPOSITORY" --body "$(cat <<EOF
Dependabot remediation and branch cleanup completed.

- Open Dependabot alerts: **0**
- Consolidated fix merged to \`main\`: \`9df89a099fb0fc14aad6442f3587351df382d230\`
- Dependency branches deleted:
${deleted}
EOF
          )"
          gh pr close "$CLEANUP_PR" --repo "$REPOSITORY" --comment "One-time cleanup completed; this PR must not be merged."
          git push origin --delete "$CLEANUP_BRANCH"
