name: tests-ci

on:
  pull_request:
    paths:
      - 'app/**'
      - 'packaging/**'
      - 'scripts/verify_bundled_binaries.py'
      - 'tests/**'
      - '.github/workflows/tests-ci.yml'
      - 'requirements.in'
      - 'requirements-locked.txt'
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'packaging/**'
      - 'scripts/verify_bundled_binaries.py'
      - 'tests/**'
      - '.github/workflows/tests-ci.yml'
      - 'requirements.in'
      - 'requirements-locked.txt'

# Minimum required permissions — no writes to the repo.
permissions:
  contents: read

jobs:
  pytest:
    # Run on Windows because DupeZ is Windows-first; most security
    # primitives (DPAPI, named pipes) have no POSIX equivalent, so we
    # pay the runner-minute cost to test the production OS.
    runs-on: windows-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements-locked.txt
          pip install pytest pytest-cov

      - name: Run pytest
        shell: bash
        env:
          # Ensure offsec layer refuses to run in CI.
          DUPEZ_OFFSEC_CONSENT: ""
          # Second-factor gate is disabled in CI so tests that hit
          # gated surfaces (elevation, plugins.loader, offsec.runner)
          # don't stall on a prompt. The gate itself is exercised in
          # tests/test_second_factor.py with the env var NOT set.
          DUPEZ_SECOND_FACTOR_DISABLED: "1"
        run: |
          python -m pytest tests/ -q --maxfail=5 \
            --cov=app.core.second_factor \
            --cov=app.gui.dayz_account_tracker \
            --cov-report=term

  ast-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: AST-parse every app/*.py
        shell: bash
        run: |
          python -c "
          import ast, pathlib, sys
          fails = []
          for p in pathlib.Path('app').rglob('*.py'):
              try:
                  ast.parse(p.read_text(encoding='utf-8'))
              except SyntaxError as e:
                  fails.append((str(p), str(e)))
          if fails:
              for f, err in fails:
                  print(f'SYNTAX FAIL {f}: {err}')
              sys.exit(1)
          print(f'AST OK: scanned all files')
          "
