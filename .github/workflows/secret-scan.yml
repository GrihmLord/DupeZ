name: secret-scan

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main]
  schedule:
    # Weekly sweep of the full history
    - cron: "0 12 * * 1"

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "true"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"

  detect-secrets:
    name: detect-secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"

      - name: Install detect-secrets
        run: pip install detect-secrets==1.5.0 pytest

      - name: Scan for new secrets
        run: |
          if [ -f .secrets.baseline ]; then
            detect-secrets scan --baseline .secrets.baseline
            detect-secrets audit --report .secrets.baseline
          else
            echo "No baseline found — running initial scan"
            detect-secrets scan --all-files > /tmp/scan.json
            python -c "import json,sys; d=json.load(open('/tmp/scan.json')); findings=sum(len(v) for v in d.get('results',{}).values()); print(f'{findings} potential secrets'); sys.exit(1 if findings>0 else 0)"
          fi

      - name: Guard source against secrets and public IP literals
        run: python -m pytest tests/test_source_leak_guard.py
