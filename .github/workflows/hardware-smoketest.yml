name: Hardware Smoketest

# Runs only on a prepared self-hosted Windows Administrator runner attached to
# an explicitly authorized private target. Missing authorization is a hard
# failure, not a successful pytest skip.
#
# Required repository configuration for scheduled runs:
#   vars.DUPEZ_SMOKETEST_TARGET_IP
#   secrets.DUPEZ_SMOKETEST_TARGET_MAC
# Optional:
#   vars.DUPEZ_SMOKETEST_CIDR
#   vars.DUPEZ_SMOKETEST_LAG_MS
#   vars.DUPEZ_SMOKETEST_DURATION

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      cidr:
        description: 'Optional private CIDR override, e.g. 192.168.1.0/24'
        required: false
        default: ''
      target_ip:
        description: 'Exact authorized private target IP'
        required: false
        default: ''
      target_mac:
        description: 'Exact authorized target MAC (prefer repository secret for schedules)'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: hardware-smoketest
  cancel-in-progress: false

jobs:
  hardware-smoketest:
    runs-on: [self-hosted, windows, admin, windivert]
    timeout-minutes: 30
    env:
      DUPEZ_RUN_HARDWARE_SMOKETEST: '1'
      DUPEZ_SMOKETEST_CIDR: ${{ github.event.inputs.cidr || vars.DUPEZ_SMOKETEST_CIDR }}
      DUPEZ_SMOKETEST_TARGET_IP: ${{ github.event.inputs.target_ip || vars.DUPEZ_SMOKETEST_TARGET_IP }}
      DUPEZ_SMOKETEST_TARGET_MAC: ${{ github.event.inputs.target_mac || secrets.DUPEZ_SMOKETEST_TARGET_MAC }}
      DUPEZ_SMOKETEST_LAG_MS: ${{ vars.DUPEZ_SMOKETEST_LAG_MS || '100' }}
      DUPEZ_SMOKETEST_DURATION: ${{ vars.DUPEZ_SMOKETEST_DURATION || '3.0' }}
      DUPEZ_SMOKETEST_MODULE_DURATION: ${{ vars.DUPEZ_SMOKETEST_MODULE_DURATION || '3.0' }}
      DUPEZ_SMOKETEST_FULL_TIMER_SECONDS: '4'

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        # Keep v6 until the self-hosted runner is explicitly certified for the
        # Node runtime required by actions/setup-python v7.
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'

      - name: Validate explicit authorization
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:DUPEZ_SMOKETEST_TARGET_IP)) {
            throw 'DUPEZ_SMOKETEST_TARGET_IP is required; refusing a false-green hardware run.'
          }
          if ([string]::IsNullOrWhiteSpace($env:DUPEZ_SMOKETEST_TARGET_MAC)) {
            throw 'DUPEZ_SMOKETEST_TARGET_MAC is required; refusing a false-green hardware run.'
          }
          $parsed = $null
          if (-not [System.Net.IPAddress]::TryParse(
              $env:DUPEZ_SMOKETEST_TARGET_IP,
              [ref]$parsed
          )) {
            throw 'DUPEZ_SMOKETEST_TARGET_IP is invalid.'
          }
          if ($env:DUPEZ_SMOKETEST_TARGET_MAC -notmatch '^(?:[0-9A-Fa-f]{2}[:-]){5}[0-9A-Fa-f]{2}$') {
            throw 'DUPEZ_SMOKETEST_TARGET_MAC is invalid.'
          }
          Write-Host 'Explicit hardware authorization: PRESENT'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements-locked.txt
          pip install pytest

      - name: Verify WinDivert and Clumsy artifacts
        shell: pwsh
        run: |
          $required = @(
            'app/firewall/WinDivert.dll',
            'app/firewall/WinDivert64.sys',
            'app/firewall/clumsy.exe'
          )
          foreach ($path in $required) {
            if (-not (Test-Path $path)) {
              throw "Required hardware artifact missing: $path"
            }
          }

      - name: Run authorized native, full Clumsy, hidden-window, and event-queue gates
        shell: pwsh
        run: |
          $tests = @(
            'tests/test_hardware_smoketest.py',
            'tests/test_direct_clumsy_event_hardware.py',
            'tests/test_clumsy_full_controls_hardware.py',
            'tests/test_clumsy_hidden_window_hardware.py'
          )
          python -X faulthandler -m pytest `
            -q `
            -m hardware `
            -s `
            --tb=short `
            $tests 2>&1 | Tee-Object -FilePath smoketest.log
          if ($LASTEXITCODE -ne 0) {
            throw "Authorized hardware smoke failed with exit code $LASTEXITCODE"
          }

      - name: Assert no owned Clumsy process leaked
        if: always()
        shell: pwsh
        run: |
          $leaked = @(Get-CimInstance Win32_Process -Filter "Name = 'clumsy.exe'" -ErrorAction SilentlyContinue)
          if ($leaked.Count -gt 0) {
            $leaked | Select-Object ProcessId, ExecutablePath | Format-Table -AutoSize
            throw 'Hardware workflow left a clumsy.exe process running.'
          }

      - name: Upload hardware diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: hardware-smoketest-${{ github.run_id }}
          path: |
            smoketest.log
            logs/**/*.log
          if-no-files-found: warn
          retention-days: 14
