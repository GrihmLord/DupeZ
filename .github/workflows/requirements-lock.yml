name: Requirements Lock Verification

# Enforces supply-chain integrity by requiring:
#   1. requirements.in has been compiled to requirements-locked.txt
#   2. the lock file contains hashes for every resolved dependency
#   3. `pip install --require-hashes` can resolve the committed artifact
#
# requirements-locked.txt declares Python 3.11 as its canonical compiler.

on:
  push:
    branches: [main]
    paths:
      - "requirements.in"
      - "requirements-locked.txt"
      - "scripts/lock-requirements.*"
      - ".github/workflows/requirements-lock.yml"
  pull_request:
    paths:
      - "requirements.in"
      - "requirements-locked.txt"
      - "scripts/lock-requirements.*"
      - ".github/workflows/requirements-lock.yml"

permissions:
  contents: read

jobs:
  verify-lock:
    name: Lockfile in sync and installable
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up canonical Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Install pip-tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-tools

      - name: Verify lockfile contains hashes
        run: |
          if ! grep -q -- "--hash=sha256:" requirements-locked.txt; then
            echo "::error::requirements-locked.txt contains no --hash= entries."
            echo "::error::Run scripts/lock-requirements.sh and commit the result."
            exit 1
          fi

      - name: Resolve canonical lock and capture drift
        id: lock_drift
        shell: bash
        run: |
          set -euo pipefail
          cp requirements-locked.txt /tmp/committed-requirements-locked.txt
          pip-compile \
            --generate-hashes \
            --resolver=backtracking \
            --output-file=/tmp/generated-requirements-locked.txt \
            requirements.in
          if diff -u \
              /tmp/committed-requirements-locked.txt \
              /tmp/generated-requirements-locked.txt \
              > /tmp/requirements-lock.diff; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
            echo "requirements-locked.txt is in sync."
          else
            echo "drift=true" >> "$GITHUB_OUTPUT"
            echo "::error::requirements-locked.txt is OUT OF SYNC with requirements.in."
            echo "::error::Download the requirements-lock-drift artifact for the exact generated lock and unified diff."
            head -80 /tmp/requirements-lock.diff || true
          fi

      - name: Upload lock drift diagnostics
        if: steps.lock_drift.outputs.drift == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: requirements-lock-drift-${{ github.run_id }}
          path: |
            /tmp/committed-requirements-locked.txt
            /tmp/generated-requirements-locked.txt
            /tmp/requirements-lock.diff
          if-no-files-found: error
          retention-days: 7

      - name: Fail on lock drift
        if: steps.lock_drift.outputs.drift == 'true'
        run: |
          echo "Regenerate requirements-locked.txt with canonical Python 3.11."
          exit 1

      - name: Dry-run --require-hashes install
        if: steps.lock_drift.outputs.drift != 'true'
        run: |
          python -m pip install --dry-run --require-hashes \
            -r requirements-locked.txt || {
              echo "::warning::Full --require-hashes install failed on Linux."
              echo "::warning::Windows CI enforces the complete runtime installation path."
              exit 0
            }
