name: Dependency Review

on:
  pull_request:
    paths:
      - "requirements.in"
      - "requirements-locked.txt"
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Review dependency changes
        id: dependency-review
        continue-on-error: true
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate
          fail-on-scopes: runtime
          show-openssf-scorecard: true

      - name: Dependency review unavailable
        if: steps.dependency-review.outcome == 'failure'
        run: |
          echo "::warning::Dependency Review failed or is unavailable."
          echo "::warning::Enable Dependency Graph in repository security settings for blocking dependency review."
