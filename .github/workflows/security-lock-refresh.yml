name: Security Lock Refresh

on:
  push:
    branches:
      - security/v5.7.9-dependency-fixes
  workflow_dispatch:

permissions:
  contents: write
  security-events: read

jobs:
  refresh-runtime-lock:
    name: Regenerate and verify runtime lock
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out security branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Set up canonical Python 3.11
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deterministic lock tooling
        run: |
          python -m pip install --upgrade "pip<27" "pip-tools==7.6.0"

      - name: Regenerate lock from existing pins and security constraints
        run: |
          python -m piptools compile \
            --generate-hashes \
            --resolver=backtracking \
            --output-file=requirements-locked.txt \
            requirements.in

      - name: Reject duplicate hashes within a requirement block
        shell: python
        run: |
          from pathlib import Path
          import re

          text = Path("requirements-locked.txt").read_text(encoding="utf-8")
          blocks = re.split(r"(?m)(?=^[A-Za-z0-9_.-]+==)", text)
          failures = []
          for block in blocks:
              first = block.splitlines()[0].strip() if block.splitlines() else ""
              if "==" not in first:
                  continue
              hashes = re.findall(r"--hash=sha256:([0-9a-f]{64})", block)
              duplicates = sorted({value for value in hashes if hashes.count(value) > 1})
              if duplicates:
                  failures.append((first, duplicates))

          if failures:
              for requirement, duplicates in failures:
                  print(f"duplicate hashes in {requirement}: {duplicates}")
              raise SystemExit(1)

          print("Per-requirement hash uniqueness: PASS")

      - name: Verify direct requirements against hashed pins
        run: python scripts/verify_requirements_lock.py

      - name: Dry-run complete hashed graph
        run: python -m pip install --dry-run --require-hashes -r requirements-locked.txt

      - name: Show security package pins
        run: |
          grep -Ei '^(cryptography|pillow|urllib3|idna|zeroconf)==' requirements-locked.txt

      - name: Commit regenerated lock when changed
        id: commit_lock
        shell: bash
        run: |
          if git diff --quiet -- requirements-locked.txt; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Runtime lock is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add requirements-locked.txt
          git commit -m "security: regenerate runtime lock for patched dependencies"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Inventory open CodeQL alerts
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          echo "Open code-scanning alerts:"
          gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${GITHUB_REPOSITORY}/code-scanning/alerts?state=open&per_page=100" \
            --jq '.[] | [(.number|tostring), (.rule.security_severity_level // .rule.severity // "unknown"), (.rule.id // "unknown"), (.most_recent_instance.location.path // "unknown"), ((.most_recent_instance.location.start_line // 0)|tostring), (.html_url // "")] | @tsv'
