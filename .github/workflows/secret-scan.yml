name: secret-scan

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main]
  schedule:
    # Weekly sweep of the full history
    - cron: "0 12 * * 1"

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "true"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"

  detect-secrets:
    name: detect-secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install detect-secrets
        run: pip install detect-secrets==1.5.0

      - name: Scan for new secrets
        run: |
          if [ -f .secrets.baseline ]; then
            detect-secrets scan --baseline .secrets.baseline
            detect-secrets audit --report --fail-on-unaudited .secrets.baseline || true
          else
            echo "No baseline found — running initial scan"
            detect-secrets scan --all-files > /tmp/scan.json
            python -c "import json,sys; d=json.load(open('/tmp/scan.json')); findings=sum(len(v) for v in d.get('results',{}).values()); print(f'{findings} potential secrets'); sys.exit(1 if findings>0 else 0)"
          fi
